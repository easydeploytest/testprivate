name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  deploy:
    if: "github.repository != 'easydeploytest/template' && !startsWith(github.ref, 'refs/tags/')"
    runs-on: [self-hosted, easydeploy-aks]
    steps:
      - uses: actions/checkout@v4
      - run: easy-deploy bootstrap
      - run: easy-deploy build
      - run: easy-deploy generate && easy-deploy update-image && easy-deploy commit
      - run: easy-deploy runbook
      - run: easy-deploy k8s-secrets
      - run: easy-deploy infisical-project && easy-deploy grafana
      - run: easy-deploy argocd-sync
      - if: success()
        run: easy-deploy notify-success
      - if: failure()
        run: easy-deploy notify-failed

  promote:
    if: "github.repository != 'easydeploytest/template' && startsWith(github.ref, 'refs/tags/')"
    runs-on: [self-hosted, easydeploy-aks]
    steps:
      - uses: actions/checkout@v4
      - run: easy-deploy promote-bootstrap
      - run: easy-deploy retag
      - run: easy-deploy update-prod-image && easy-deploy commit-prod
      - run: easy-deploy argocd-sync-prod
